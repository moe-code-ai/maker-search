name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: config.js を生成
        run: |
          echo "const SITE_PASSWORD = \"${{ secrets.SITE_PASSWORD }}\";" > config.js
          echo "const EMBEDDED_API_KEY = \"${{ secrets.ANTHROPIC_API_KEY }}\";" >> config.js

      - name: GitHub Pages にデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,README.md'
